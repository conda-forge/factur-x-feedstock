schema_version: 1

context:
  name: factur-x
  version: '5.1'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 94504e4726aad3a9aeb1dc5da7e417904ec78fe504756c5aa0aa83d2de71322e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - hatchling
    - hatch-requirements-txt
  run:
    - python >=${{ python_min }}
    - pypdf >=5.3.0
    - lxml
    - python-stdnum
tests:
  - python:
      imports:
        - facturx
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: 'Factur-X and Order-X: electronic invoicing and ordering standards'
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/akretion/factur-x

extra:
  recipe-maintainers:
    - jan-janssen
